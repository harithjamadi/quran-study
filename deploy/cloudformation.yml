AWSTemplateFormatVersion: "2010-09-09"
Description: >
  mubinapp.com - Free Tier deployment. A single t3.micro running the Next.js
  standalone app + Caddy (auto-TLS) via docker compose, behind a hardened
  security group (22 from your IP only, 80, 443) with a stable Elastic IP.

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair (created via deploy script) for SSH.
  SshCidr:
    Type: String
    Default: 175.139.116.252/32
    Description: CIDR allowed to reach SSH (port 22). Your detected public IP /32.
    AllowedPattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2])$
  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0fd3f210040ef0ff6
    Description: Amazon Linux 2023 x86_64 AMI for ap-southeast-5.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0643e4dc0fd8c7502
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-07f08b4d68de8d1d8
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t2.micro]
  RepoUrl:
    Type: String
    Default: https://github.com/harithjamadi/quran-study.git
    Description: Git URL cloned on boot. Must be publicly cloneable (or pre-baked).
  RepoBranch:
    Type: String
    Default: production
    Description: Branch the instance deploys from (kept separate from Vercel's main).

Resources:
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: mubin app - SSH (restricted), HTTP, HTTPS only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr
          Description: SSH from owner IP only
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (Caddy redirects to HTTPS)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: udp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTP/3 (QUIC)
      Tags:
        - { Key: Name, Value: mubin-sg }
        - { Key: Project, Value: mubin }

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30          # Free Tier EBS ceiling (gp3)
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - { Key: Name, Value: mubin-app }
        - { Key: Project, Value: mubin }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > /var/log/mubin-bootstrap.log 2>&1

          # --- 2 GB swap so `next build` doesn't OOM on a 1 GiB t3.micro ---
          if [ ! -f /swapfile ]; then
            fallocate -l 2G /swapfile
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
          fi

          # --- Docker + git ---
          dnf update -y
          dnf install -y docker git
          systemctl enable --now docker
          usermod -aG docker ec2-user

          # --- docker compose v2 plugin ---
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -SL "https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-linux-x86_64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          # --- App: clone + build + run ---
          APP_DIR=/opt/mubin
          rm -rf "$APP_DIR"
          git clone -b "${RepoBranch}" --single-branch "${RepoUrl}" "$APP_DIR"
          cd "$APP_DIR"
          docker compose up -d --build

          echo "mubin bootstrap complete"

  AppEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - { Key: Name, Value: mubin-eip }
        - { Key: Project, Value: mubin }

  EipAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt AppEip.AllocationId
      InstanceId: !Ref AppInstance

Outputs:
  PublicIp:
    Description: Stable Elastic IP — point mubinapp.com's DNS A record here.
    Value: !Ref AppEip
  DnsRecordToCreate:
    Description: DNS record to add at your registrar.
    Value: !Sub "A  mubinapp.com  ->  ${AppEip}"
  SshCommand:
    Description: SSH in (after creating the key .pem locally).
    Value: !Sub "ssh -i ${KeyName}.pem ec2-user@${AppEip}"
  BootstrapLog:
    Description: Where to read the boot/deploy log on the instance.
    Value: /var/log/mubin-bootstrap.log
